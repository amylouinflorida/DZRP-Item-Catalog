<!DOCTYPE html>
<html>
<head>
    <title>{{ item.display_name }} - DayZRP Item Catalog</title>
</head>

<body>

<a href="/catalog">← Back to Catalog</a>

<h1>{{ item.display_name }}</h1>

<p>{{ item.description }}</p>

<h2>Identity</h2>

<p><strong>Display Name:</strong> {{ item.display_name }}</p>
<p><strong>Classname:</strong> {{ item.classname }}</p>
<p><strong>Category:</strong> {{ item.category }}</p>
<p><strong>Subcategory:</strong> {{ item.subcategory }}</p>
<p><strong>Source:</strong> {{ item.mod_name }}</p>
<p><strong>Author:</strong> {{ item.mod_author }}</p>

</body>
</html>
