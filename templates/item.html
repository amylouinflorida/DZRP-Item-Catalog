<!DOCTYPE html>
<html>
<head>
    <title>{{ item.display_name }} - DayZRP Item Catalog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="page-wrap">

    <a class="back-link" href="/catalog">← Back to Catalog</a>

    <div class="item-detail-card">

        <div class="item-image-panel">
            <img class="item-detail-image"
                 src="{{ url_for('static', filename='images/items/' ~ item.image) }}"
                 alt="{{ item.display_name }}">
        </div>

        <div class="item-info-panel">

            <h1>{{ item.display_name }}</h1>

            <p class="item-description">
                {{ item.description }}
            </p>

            <div class="identity-box">
                <h2>Identity</h2>

                <div class="identity-row">
                    <span>Display Name</span>
                    <strong>{{ item.display_name }}</strong>
                </div>

                <div class="identity-row">
                    <span>Classname</span>
                    <strong>{{ item.classname }}</strong>
                </div>

                <div class="identity-row">
                    <span>Category</span>
                    <strong>{{ item.category }}</strong>
                </div>

                <div class="identity-row">
                    <span>Subcategory</span>
                    <strong>{{ item.subcategory }}</strong>
                </div>

                <div class="identity-row">
                    <span>Source</span>
                    <strong>{{ item.mod_name }}</strong>
                </div>

                <div class="identity-row">
                    <span>Author</span>
                    <strong>{{ item.mod_author }}</strong>
                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
