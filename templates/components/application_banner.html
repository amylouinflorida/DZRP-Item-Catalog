<section class="application-banner">

    <a class="banner-logo-link" href="/">
        <img
            src="{{ url_for('static', filename='images/logo/dayzrp-logo.png') }}"
            alt="DayZRP Item Catalog">
    </a>

    <div class="banner-title-block {{ banner_class }}">
        <h1>
            <i class="{{ banner_icon }}"></i>
            {{ banner_title }}
        </h1>
        <p>{{ banner_subtitle }}</p>
    </div>

    <div class="banner-side-panel">

    <div class="banner-mini-section">
        <h3>
            <i class="fa-solid fa-toolbox"></i>
            Item Tools
        </h3>

        {% if item is defined %}
            <button class="banner-action-link" type="button" onclick="copyClassname()">
                <i class="fa-regular fa-copy"></i>
                Copy Classname
            </button>

            <form action="/favorite/{{ item.classname }}" method="post">
                <button class="banner-action-link" type="submit">
                    <i class="fa-solid fa-thumbtack"></i>
                    {% if favorite %}Unpin Item{% else %}Pin Item{% endif %}
                </button>
            </form>

            <button class="banner-action-link" type="button" onclick="toggleReportForm()">
                <i class="fa-solid fa-flag"></i>
                Report Database Issue
            </button>
        {% else %}
            <a href="/">
                <i class="fa-solid fa-house"></i>
                Return Home
            </a>
        {% endif %}
    </div>

</div>

        <div class="banner-mini-section">
            <h3>
                <i class="fa-solid fa-fire"></i>
                {{ banner_context_title }}
            </h3>

            {% if banner_context_items %}
                {% for item in banner_context_items[:2] %}
                    <a href="/item/{{ item.classname }}">
                        {{ item.display_name }}
                    </a>
                {% endfor %}
            {% else %}
                <span class="muted">No data yet</span>
            {% endif %}
        </div>

    </div>

</section>
